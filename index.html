<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="מטלות הבית">
<meta name="theme-color" content="#1a1a1a">
<link rel="apple-touch-icon" sizes="180x180" id="app-icon" href="">
<title>מטלות הבית</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&family=Rubik:wght@700;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --red:#ff6b6b; --teal:#4ecdc4; --orange:#f7a440; --purple:#a55eea; --green:#55efc4; --bg:#fdf6ec; --text:#2d3436; --muted:#b2bec3; --white:#fff; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px 16px calc(80px + env(safe-area-inset-bottom));
  overflow-x: hidden;
  background-image:
    radial-gradient(circle at 15% 15%, #ffe0e0 0%, transparent 45%),
    radial-gradient(circle at 85% 85%, #d0f5f3 0%, transparent 45%);
}

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── Nav ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white; border-top: 2px solid #f0f0f0;
  display: flex; z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,.07);
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 10px 0 12px; gap: 3px; background: none; border: none;
  cursor: pointer; font-family: 'Heebo', sans-serif; font-size: .72rem;
  font-weight: 600; color: var(--muted); transition: color .2s;
}
.nav-btn .ni { font-size: 1.4rem; transition: transform .2s; }
.nav-btn.active { color: var(--red); }
.nav-btn.active .ni { transform: translateY(-2px); }

/* ── Page header ── */
h1 { font-family: 'Rubik', sans-serif; font-weight: 800; text-align: center; font-size: 2.4rem; color: var(--red); margin-bottom: 4px; }
.subtitle { text-align: center; color: var(--muted); font-size: .88rem; margin-bottom: 20px; }

/* ── Card ── */
.card {
  max-width: 680px; margin: 0 auto 0;
  background: white; border-radius: 18px; padding: 16px 20px;
  border: 2px solid #f0f0f0; box-shadow: 3px 3px 0 #f0f0f0;
}
.card + .card { margin-top: 12px; }

/* ── Section title ── */
.sec-title {
  font-family: 'Rubik', sans-serif; font-weight: 800; font-size: .95rem;
  color: var(--text); margin-bottom: 12px;
}
.divider { border-top: 1px dashed #ebebeb; margin: 16px 0; }

/* ── Task grid ── */
.task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; }
.task-card {
  background: white; border-radius: 14px; padding: 14px 12px;
  border: 2px solid #f0f0f0; box-shadow: 2px 2px 0 #f5f5f5;
  display: flex; flex-direction: column; align-items: center;
  justify-content: space-between; gap: 8px; cursor: pointer;
  transition: all .2s; text-align: center; min-height: 110px;
  position: relative;
}
.task-card:active { transform: scale(.97); }
.task-card.done { opacity: .5; border-color: #b2e8b2; box-shadow: 2px 2px 0 #d4f5d4; }
.task-icon { font-size: 2.2rem; }
.task-label { font-size: .8rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.task-badge {
  display: inline-block; padding: 4px 12px; border-radius: 50px;
  font-size: .76rem; font-weight: 700; background: white; border: 2px solid;
}
.task-check {
  position: absolute; top: 7px; left: 7px;
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid #ddd; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: .65rem; font-weight: 700; transition: all .2s;
}
.task-card.done .task-check { background: var(--green); border-color: var(--green); color: var(--text); }

/* ── Child buttons ── */
.child-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.cbtn {
  font-family: 'Heebo', sans-serif; font-size: .82rem; font-weight: 700;
  padding: 6px 16px; border: 2px solid; border-radius: 50px;
  background: white; cursor: pointer; transition: all .18s;
}
.cbtn-tamar   { border-color: var(--red);    color: var(--red);    }
.cbtn-yair    { border-color: var(--teal);   color: var(--teal);   }
.cbtn-shira   { border-color: var(--orange); color: var(--orange); }
.cbtn-daniela { border-color: var(--purple); color: var(--purple); }
.cbtn.act-tamar   { background: var(--red);    color: white; }
.cbtn.act-yair    { background: var(--teal);   color: white; }
.cbtn.act-shira   { background: var(--orange); color: white; }
.cbtn.act-daniela { background: var(--purple); color: white; }

/* ── Personal list ── */
.personal-list { display: flex; flex-direction: column; gap: 5px; }
.personal-row {
  background: #fafafa; border-radius: 10px; padding: 9px 12px;
  border: 1px solid #f0f0f0; display: flex; align-items: center; gap: 10px;
}
.personal-row.today { background: #fffbe6; border-color: #ffe66d; }
.p-date { font-weight: 700; font-size: .76rem; color: var(--muted); min-width: 46px; }
.p-day  { font-weight: 600; font-size: .76rem; min-width: 44px; }
.p-tasks { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }
.pill { font-size: .7rem; font-weight: 600; padding: 2px 9px; border-radius: 50px; color: white; }
.pl { background: #74b9ff; }
.pd { background: #fd79a8; }
.pt { background: var(--green); color: var(--text); }
.pto { background: #a29bfe; }
.pb { background: #636e72; }

/* ── Shop ── */
.shop-controls { display: flex; gap: 8px; margin-bottom: 12px; }
.shop-input {
  flex: 1; font-family: 'Heebo', sans-serif; font-size: .9rem;
  padding: 9px 12px; border: 2px solid #e0e0e0; border-radius: 11px; outline: none;
}
.shop-input:focus { border-color: var(--teal); }
.qty-input {
  width: 62px; font-family: 'Heebo', sans-serif; font-size: .85rem;
  padding: 9px 8px; border: 2px solid #e0e0e0; border-radius: 11px; outline: none;
}
.qty-input:focus { border-color: var(--teal); }
.add-btn {
  width: 42px; height: 42px; border: none; border-radius: 11px;
  background: var(--teal); color: white; font-size: 1.3rem; font-weight: 700;
  cursor: pointer; flex-shrink: 0;
}
.clear-btn {
  font-family: 'Heebo', sans-serif; font-size: .76rem; font-weight: 600;
  padding: 7px 11px; border: 2px solid var(--red); border-radius: 11px;
  background: white; color: var(--red); cursor: pointer; white-space: nowrap;
}
.shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px; }
.shop-col { background: #fafafa; border-radius: 12px; padding: 11px; border: 1px solid #f0f0f0; }
.shop-col-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.shop-col-icon { font-size: 1.2rem; }
.shop-col-title { font-family: 'Rubik', sans-serif; font-weight: 800; font-size: .8rem; flex: 1; }
.shop-col-cnt { background: white; color: var(--muted); font-size: .66rem; font-weight: 700; padding: 1px 5px; border-radius: 50px; border: 1px solid #eee; }
.shop-items { display: flex; flex-direction: column; gap: 4px; }
.shop-item { display: flex; align-items: center; gap: 6px; padding: 5px 7px; border-radius: 8px; background: white; border: 1px solid #f0f0f0; }
.shop-item.done { opacity: .4; }
.shop-item.done .iname { text-decoration: line-through; }
.ichk {
  width: 18px; height: 18px; border-radius: 50%; border: 2px solid #ddd;
  cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; font-size: .62rem; background: white;
}
.shop-item.done .ichk { background: var(--teal); border-color: var(--teal); color: white; }
.iname { flex: 1; font-size: .8rem; font-weight: 500; }
.iqty  { font-size: .66rem; color: var(--muted); background: #f5f5f5; padding: 1px 5px; border-radius: 50px; }
.idel { width: 18px; height: 18px; border: none; background: none; color: #ccc; font-size: .72rem; cursor: pointer; }
.idel:hover { color: var(--red); }
.iedit { width: 18px; height: 18px; border: none; background: none; color: #b2bec3; font-size: .8rem; cursor: pointer; }
.iedit-input { font-family: 'Heebo', sans-serif; font-size: .8rem; border: none; background: transparent; outline: none; flex: 1; min-width: 0; }
.isave { font-family: 'Heebo', sans-serif; font-size: .68rem; font-weight: 700; padding: 2px 7px; border: none; border-radius: 50px; background: var(--teal); color: white; cursor: pointer; }
.shop-empty { font-size: .72rem; color: #ccc; text-align: center; padding: 5px 0; }

/* ── Friday ── */
.fri-card { max-width: 680px; margin: 0 auto 12px; background: white; border-radius: 18px; padding: 0; border: 2px solid #f0f0f0; box-shadow: 3px 3px 0 #f0f0f0; overflow: hidden; }
.fri-hdr { display: flex; align-items: center; gap: 11px; cursor: pointer; padding: 16px 20px; user-select: none; }
.fri-hdr-icon { font-size: 1.8rem; }
.fri-hdr-title { font-family: 'Rubik', sans-serif; font-weight: 800; font-size: 1.05rem; flex: 1; }
.fri-arrow { color: var(--muted); font-size: .9rem; transition: transform .25s; }
.fri-hdr.open .fri-arrow { transform: rotate(180deg); }
.fri-body { display: none; padding: 0 20px 16px; border-top: 1px dashed #eee; padding-top: 14px; }
.fri-body.open { display: block; }
.fri-hint { font-size: .78rem; color: var(--muted); margin-bottom: 10px; }
.coming-grid { display: flex; gap: 8px; flex-wrap: wrap; }
.poll-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
.poll-input { flex: 1; font-family: 'Heebo', sans-serif; font-size: .88rem; padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 10px; outline: none; }
.poll-input:focus { border-color: var(--teal); }
.poll-add { width: 38px; height: 38px; border: none; border-radius: 10px; background: var(--teal); color: white; font-size: 1.2rem; cursor: pointer; }
.poll-item { display: flex; flex-direction: column; gap: 6px; padding: 8px 10px; background: #fafafa; border-radius: 10px; border: 1px solid #f0f0f0; margin-bottom: 6px; }
.poll-item.editing { background: #f0faff; border-color: #4ecdc4; }
.poll-item-main { display: flex; align-items: center; gap: 8px; }
.poll-text { flex: 1; font-size: .85rem; font-weight: 600; }
.poll-actions { display: flex; gap: 3px; }
.poll-votes { display: flex; gap: 4px; flex-wrap: wrap; }
.poll-edit-input { font-family: 'Heebo', sans-serif; font-size: .85rem; font-weight: 600; border: none; background: transparent; outline: none; flex: 1; }
.poll-save-btn { font-family: 'Heebo', sans-serif; font-size: .68rem; font-weight: 700; padding: 2px 8px; border: none; border-radius: 50px; background: #4ecdc4; color: white; cursor: pointer; }
.vote-chip { font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 50px; cursor: pointer; opacity: .45; color: white; transition: opacity .18s; }
.vote-chip.voted { opacity: 1; }
.poll-del-btn  { border: none; background: none; color: #ccc; font-size: .78rem; cursor: pointer; }
.poll-del-btn:hover  { color: var(--red); }
.poll-edit-btn { border: none; background: none; color: #b2bec3; font-size: .82rem; cursor: pointer; }
.poll-edit-btn:hover { color: #4ecdc4; }
.ftask { display: flex; align-items: center; gap: 9px; padding: 9px 11px; background: #fafafa; border-radius: 11px; border: 1px solid #f0f0f0; margin-bottom: 6px; transition: all .18s; }
.ftask.done { opacity: .45; }
.ftask.done .ftlabel { text-decoration: line-through; }
.ftcheck { width: 21px; height: 21px; border-radius: 50%; border: 2px solid #e0e0e0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .66rem; }
.ftask.done .ftcheck { background: var(--green); border-color: var(--green); }
.ftlabel { flex: 1; font-size: .85rem; font-weight: 600; }
.ftassign { display: flex; gap: 5px; flex-wrap: wrap; }
.ft-chip { font-family: 'Heebo', sans-serif; font-size: .72rem; font-weight: 700; padding: 3px 11px; border: 2px solid; border-radius: 50px; background: white; display: inline-block; }
.ft-btn  { font-family: 'Heebo', sans-serif; font-size: .72rem; font-weight: 700; padding: 3px 11px; border: 2px solid; border-radius: 50px; background: white; cursor: pointer; }

/* ── WA button ── */
.wa-wrap { margin-top: 10px; }
.wa-toggle { font-family: 'Heebo', sans-serif; font-size: .8rem; font-weight: 600; padding: 6px 14px; border: 2px solid #25d366; border-radius: 50px; background: white; color: #25d366; cursor: pointer; }
.wa-settings { display: none; background: #f9fffe; border: 2px solid #e0f8ee; border-radius: 12px; padding: 12px; margin-top: 8px; }
.wa-phone-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.wa-name { font-weight: 700; font-size: .82rem; min-width: 50px; }
.wa-input { font-family: 'Heebo', sans-serif; font-size: .8rem; padding: 5px 9px; border: 2px solid #e0e0e0; border-radius: 9px; outline: none; flex: 1; direction: ltr; }
.wa-save { font-family: 'Heebo', sans-serif; font-size: .78rem; font-weight: 700; padding: 6px 15px; border: none; border-radius: 50px; background: #25d366; color: white; cursor: pointer; margin-top: 4px; }
.wa-btns { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 8px; }
.wa-child-btn { font-family: 'Heebo', sans-serif; font-size: .8rem; font-weight: 700; padding: 6px 14px; border: 2px solid; border-radius: 50px; background: white; cursor: pointer; display: flex; align-items: center; gap: 5px; text-decoration: none; }

/* colors */
.ct { color: var(--red);    border-color: var(--red);    }
.cy { color: var(--teal);   border-color: var(--teal);   }
.cs { color: var(--orange); border-color: var(--orange); }
.cd { color: var(--purple); border-color: var(--purple); }
</style>
</head>
<body>

<!-- ═══ HOME PAGE ═══ -->
<div class="page active" id="page-home">
  <h1>🏠 מטלות הבית</h1>
  <p class="subtitle" id="subtitle-home"></p>

  <div class="card">
    <!-- Today -->
    <div class="sec-title" id="lbl-today">📅 היום</div>
    <div class="task-grid" id="today-cards"></div>

    <div class="divider"></div>

    <!-- Tomorrow -->
    <div class="sec-title" id="lbl-tomorrow">📆 מחר</div>
    <div class="task-grid" id="tomorrow-cards"></div>

    <div class="divider"></div>

    <!-- Full calendar -->
    <div class="sec-title">🗓️ לוח שנה מלא — לפי ילד</div>
    <div class="child-row" id="cal-row">
      <button class="cbtn cbtn-tamar"   data-name="תמר"    data-slug="tamar">תמר</button>
      <button class="cbtn cbtn-yair"    data-name="יאיר"   data-slug="yair">יאיר</button>
      <button class="cbtn cbtn-shira"   data-name="שירה"   data-slug="shira">שירה</button>
      <button class="cbtn cbtn-daniela" data-name="דניאלה" data-slug="daniela">דניאלה</button>
    </div>
    <div id="cal-detail"></div>
  </div>

  <!-- WA reminders -->
  <div class="card" style="margin-top:12px;">
    <div class="wa-wrap">
      <button class="wa-toggle" onclick="toggleWA()">📱 שלח תזכורות בוואטסאפ</button>
      <div class="wa-settings" id="wa-settings">
        <div id="wa-phones-list"></div>
        <button class="wa-save" onclick="saveWAPhones()">שמור מספרים ✓</button>
      </div>
      <div class="wa-btns" id="wa-btns"></div>
    </div>
  </div>
</div>

<!-- ═══ SHOP PAGE ═══ -->
<div class="page" id="page-shop">
  <h1>🛒 קניות</h1>
  <p class="subtitle">רשימת הקניות שלנו</p>
  <div class="card">
    <div class="shop-controls">
      <input type="text" id="shop-inp" class="shop-input" placeholder="הוסיפי פריט..." />
      <input type="text" id="qty-inp"  class="qty-input"  placeholder="כמות" />
      <button class="add-btn" id="shop-add-btn">+</button>
      <button class="clear-btn" id="shop-clear-btn">נקה ✓</button>
    </div>
    <div class="shop-grid" id="shop-grid"></div>
  </div>
</div>

<!-- ═══ FRIDAY PAGE ═══ -->
<div class="page" id="page-friday">
  <h1>🕯️ ארוחת שישי</h1>
  <p class="subtitle" id="subtitle-friday"></p>

  <!-- Who's coming -->
  <div class="fri-card">
    <div class="fri-hdr open" onclick="toggleFri('coming')">
      <span class="fri-hdr-icon">👨‍👩‍👧‍👦</span>
      <span class="fri-hdr-title">מי מגיע?</span>
      <span class="fri-arrow" id="arr-coming">▼</span>
    </div>
    <div class="fri-body open" id="body-coming">
      <p class="fri-hint">לחצו על שם כדי לסמן מגיע ✓</p>
      <div class="coming-grid">
        <button class="cbtn cbtn-tamar"   data-slug="tamar"   onclick="toggleComing(this)">תמר</button>
        <button class="cbtn cbtn-yair"    data-slug="yair"    onclick="toggleComing(this)">יאיר</button>
        <button class="cbtn cbtn-shira"   data-slug="shira"   onclick="toggleComing(this)">שירה</button>
        <button class="cbtn cbtn-daniela" data-slug="daniela" onclick="toggleComing(this)">דניאלה</button>
      </div>
      <div id="coming-summary" style="font-size:.8rem;color:#636e72;margin-top:8px;font-weight:600;"></div>
    </div>
  </div>

  <!-- Poll -->
  <div class="fri-card">
    <div class="fri-hdr open" onclick="toggleFri('poll')">
      <span class="fri-hdr-icon">🍽️</span>
      <span class="fri-hdr-title">מה רוצים לאכול?</span>
      <span class="fri-arrow" id="arr-poll">▼</span>
    </div>
    <div class="fri-body open" id="body-poll">
      <div class="poll-input-row">
        <input type="text" class="poll-input" id="poll-inp" placeholder="הוסיפי מנה..." />
        <button class="poll-add" onclick="addPollItem()">+</button>
      </div>
      <div id="poll-list"></div>
    </div>
  </div>

  <!-- Tasks -->
  <div class="fri-card">
    <div class="fri-hdr open" onclick="toggleFri('tasks')">
      <span class="fri-hdr-icon">✅</span>
      <span class="fri-hdr-title">מטלות לארוחה</span>
      <span class="fri-arrow" id="arr-tasks">▼</span>
    </div>
    <div class="fri-body open" id="body-tasks">
      <div id="fri-tasks-list"></div>
    </div>
  </div>
</div>

<!-- ═══ NAV ═══ -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home"   onclick="goPage('home',   this)"><span class="ni">🏠</span><span>מטלות</span></button>
  <button class="nav-btn"        id="nav-shop"   onclick="goPage('shop',   this)"><span class="ni">🛒</span><span>קניות</span></button>
  <button class="nav-btn"        id="nav-friday" onclick="goPage('friday', this)"><span class="ni">🕯️</span><span>שישי</span></button>
</nav>

<script>
// ══════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════
var KIDS    = ['תמר','יאיר','שירה','דניאלה'];
var TRASH_K = ['יאיר','שירה'];
var TOILET_K= ['תמר','שירה','דניאלה'];
var COLORS  = {תמר:'#ff6b6b', יאיר:'#4ecdc4', שירה:'#f7a440', דניאלה:'#a55eea'};
var SLUGS   = {תמר:'tamar', יאיר:'yair', שירה:'shira', דניאלה:'daniela'};
var NAMES   = {tamar:'תמר', yair:'יאיר', shira:'שירה', daniela:'דניאלה'};
var DAYS_HE = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
var HEB_M   = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
var START   = new Date(2026,1,26);
var END     = new Date(2026,3,1);

// ══════════════════════════════════════════════
//  SCHEDULE
// ══════════════════════════════════════════════
function getDays(){
  var d=[], cur=new Date(START);
  while(cur<END){ d.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
  return d;
}
function lowest(pool, load, excl){
  return pool.filter(function(k){ return excl.indexOf(k)===-1; })
             .sort(function(a,b){ return load[a]-load[b]; })[0];
}
function buildSchedule(){
  var days=getDays(), load={תמר:0,יאיר:0,שירה:0,דניאלה:0}, sch=[];
  days.forEach(function(date,i){
    var used=[], trash=null, t1=null, t2=null, binWash=false;
    if(i%2===0){ trash=lowest(TRASH_K,load,used); load[trash]++; used.push(trash); }
    if(i%7===0){
      t1=lowest(TOILET_K,load,used); load[t1]++; used.push(t1);
      t2=lowest(TOILET_K,load,used); load[t2]++; used.push(t2);
      binWash=true;
    }
    var lucy=lowest(KIDS,load,used); load[lucy]++; used.push(lucy);
    var dish=lowest(KIDS,load,used); load[dish]++;
    sch.push({date:date,lucy:lucy,dish:dish,trash:trash,t1:t1,t2:t2,binWash:binWash});
  });
  return sch;
}
var SCH = buildSchedule();

function fmt(d){ return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2); }
function isToday(d){ var t=new Date(); return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear(); }
function fmtLabel(d){ return DAYS_HE[d.getDay()]+', '+fmt(d); }

function findRow(date){
  for(var i=0;i<SCH.length;i++){
    var d=SCH[i].date;
    if(d.getFullYear()===date.getFullYear()&&d.getMonth()===date.getMonth()&&d.getDate()===date.getDate()) return {row:SCH[i],idx:i};
  }
  return null;
}

function taskKey(date,id){ return 'td_'+date.getFullYear()+'_'+(date.getMonth()+1)+'_'+date.getDate()+'_'+id; }
function isDone(date,id){ try{ return localStorage.getItem(taskKey(date,id))==='1'; }catch(e){ return false; } }
function setDone(date,id,val){
  try{
    if(val) localStorage.setItem(taskKey(date,id),'1');
    else localStorage.removeItem(taskKey(date,id));
  }catch(e){}
  try{
    if(db) db.ref('tasks/'+date.getFullYear()+'_'+(date.getMonth()+1)+'_'+date.getDate()+'_'+id).set(val||null);
  }catch(e){}
}

function buildCards(row, containerId, labelId){

  if(labelId==='lbl-tomorrow') lbl.textContent = '📆 '+fmtLabel(row.date);

    {id:'dish',   icon:'🍽️', label:'לפנות מדיח',             child:row.dish}
  ];
  if(row.trash)  tasks.push({id:'trash',   icon:'🗑️',  label:'להוציא זבל',     child:row.trash});
  if(row.t1)     tasks.push({id:'toilet1', icon:'🚽',  label:'לנקות שירותים',  child:row.t1});
  if(row.t2)     tasks.push({id:'toilet2', icon:'🚽',  label:'לנקות שירותים',  child:row.t2});
  if(row.binWash)tasks.push({id:'binwash', icon:'🪣',  label:'לשטוף פח זבל',  child:'יאיר'});

  el.innerHTML = tasks.map(function(t){

    var color = COLORS[t.child];
    return '<div class="task-card'+(done?' done':'')+'" data-date="'+row.date.toISOString()+'" data-id="'+t.id+'">'

function getNextFriday(){
  var now=new Date(), day=now.getDay();
  var diff=day===5?7:(5-day+7)%7; if(diff===0) diff=7;
  var f=new Date(now); f.setDate(now.getDate()+diff); f.setHours(0,0,0,0);
  return f;
}
function getFriRotation(){
  var ref=new Date(2026,1,27), fri=getNextFriday();
  var wk=Math.round((fri-ref)/(7*24*60*60*1000)); if(wk<0) wk=0;
  return wk%2===0?{t1:['tamar','yair'],t2:['shira','daniela']}:{t1:['shira','daniela'],t2:['tamar','yair']};
}
function applyRotation(){
  var rot=getFriRotation();
  FRI_TASKS[0].pair=rot.t1;
  FRI_TASKS[1].pair=rot.t2;
}

    row.classList.add('editing');
    var main=row.querySelector('.poll-item-main');
    main.innerHTML='<input class="poll-edit-input" id="pe_'+pid+'" value="'+item.text+'"/>'
      +'<button class="poll-save-btn" data-pid="'+pid+'">✓</button>'
      +'<button class="poll-cancel-btn" data-pid="'+pid+'" style="font-family:Heebo;font-size:.68rem;padding:2px 7px;border:none;border-radius:50px;background:#eee;cursor:pointer;">✕</button>';
    document.getElementById('pe_'+pid).focus();
    document.getElementById('pe_'+pid).addEventListener('keydown',function(ev){
      if(ev.key==='Enter') row.querySelector('.poll-save-btn').click();
      if(ev.key==='Escape') row.querySelector('.poll-cancel-btn').click();
    });
  }
  if(save){
    var pid=+save.dataset.pid;
    var val=document.getElementById('pe_'+pid).value.trim();
    if(val){ var item=FRI.poll.find(function(x){return x.id===pid;}); if(item) item.text=val; saveFriday(); }
    renderPoll();
  }
  if(cancel){ renderPoll(); }
});

function renderFriTasks(){
  var list=document.getElementById('fri-tasks-list'); if(!list) return;
  var slugs=['tamar','yair','shira','daniela'];
  list.innerHTML=FRI_TASKS.map(function(task){
    var done=FRI.taskDone[task.id];
    var assignHtml;
    if(task.auto){
      assignHtml=task.pair.map(function(s){
        return '<span class="ft-chip" style="border-color:'+FRI_COLORS[s]+';color:'+FRI_COLORS[s]+'">'+FRI_NAMES[s]+'</span>';
      }).join('');
    } else {
      assignHtml=slugs.map(function(s){
        var on=task.assignees&&task.assignees[s];
        var style=on?'background:'+FRI_COLORS[s]+';border-color:'+FRI_COLORS[s]+';color:white;':'border-color:'+FRI_COLORS[s]+';color:'+FRI_COLORS[s]+';';
        return '<button class="ft-btn" style="'+style+'" data-tid="'+task.id+'" data-slug="'+s+'">'+FRI_NAMES[s]+'</button>';
      }).join('');
    }
    return '<div class="ftask'+(done?' done':'')+'"><div class="ftcheck" data-tid="'+task.id+'">'+(done?'✓':'')+'</div><span class="ftlabel">'+task.label+'</span><div class="ftassign">'+assignHtml+'</div></div>';
  }).join('');
}
document.getElementById('fri-tasks-list').addEventListener('click',function(e){
  var chk=e.target.closest('.ftcheck'), btn=e.target.closest('.ft-btn');
  if(chk){ var tid=chk.dataset.tid; FRI.taskDone[tid]=!FRI.taskDone[tid]; saveFriday(); renderFriTasks(); }
  if(btn){ var tid=btn.dataset.tid, s=btn.dataset.slug; var t=FRI_TASKS.find(function(x){return x.id===tid;}); if(t){if(!t.assignees)t.assignees={}; t.assignees[s]=!t.assignees[s]; saveFriday(); renderFriTasks();} }
});

function toggleFri(name){
  var body=document.getElementById('body-'+name), hdr=body.previousElementSibling, arr=document.getElementById('arr-'+name);
  var open=body.classList.contains('open');
  body.classList.toggle('open',!open); hdr.classList.toggle('open',!open);
  arr.style.transform=open?'':'rotate(180deg)';
}

// Friday subtitle + reset
(function(){
  var fri=getNextFriday();
  var el=document.getElementById('subtitle-friday');
  if(el) el.textContent='יום שישי '+fri.getDate()+'/'+( fri.getMonth()+1)+'/'+fri.getFullYear();

  function checkReset(){
    var now=new Date();
    if(now.getDay()===5&&now.getHours()>=23){
      var wk=Math.round((getNextFriday()-new Date(2026,1,27))/(7*24*60*60*1000));
      if(localStorage.getItem('fri_reset')!==String(wk)){
        FRI.coming={}; FRI.poll=[]; FRI.taskDone={};
        saveFriday();
        localStorage.setItem('fri_reset',String(wk));
        renderComing(); renderPoll(); renderFriTasks();
      }
    }
  }
  checkReset();
  setInterval(checkReset,60000);
})();

var WA_PHONES={tamar:'972585030804',yair:'972585140108',shira:'972505565559',daniela:'972508655553'};
function loadWAPhones(){
  try{ var s=localStorage.getItem('wa_p'); if(s) Object.assign(WA_PHONES,JSON.parse(s)); }catch(e){}

function saveWAPhones(){
  ['tamar','yair','shira','daniela'].forEach(function(s){

function buildWAPhoneInputs(){
  var el=document.getElementById('wa-phones-list'); if(!el) return;
  var slugs=['tamar','yair','shira','daniela'];
  el.innerHTML=slugs.map(function(s){
    return '<div class="wa-phone-row"><span class="wa-name" style="color:'+FRI_COLORS[s]+'">'+FRI_NAMES[s]+'</span><input id="wa_'+s+'" class="wa-input" type="tel" value="'+(WA_PHONES[s]||'')+'" placeholder="972501234567"/></div>';
  }).join('')+'<span id="wa-save-msg" style="display:none;font-size:.76rem;color:#25d366;margin-right:6px;">✓ נשמר</span>';
}
function buildWABtns(todayRow){
  var el=document.getElementById('wa-btns'); if(!el) return;
  if(!todayRow){ el.innerHTML=''; return; }
  var tasks=[
    {label:'להוציא לוסי 🐕',child:todayRow.lucy},
    {label:'לפנות מדיח 🍽️',child:todayRow.dish}
  ];
  if(todayRow.trash) tasks.push({label:'זבל 🗑️',child:todayRow.trash});
  var byChild={};
  tasks.forEach(function(t){ if(!byChild[t.child]) byChild[t.child]=[]; byChild[t.child].push(t.label); });
  var slugs_map={תמר:'tamar',יאיר:'yair',שירה:'shira',דניאלה:'daniela'};
  el.innerHTML=Object.keys(byChild).map(function(name){
    var s=slugs_map[name], phone=WA_PHONES[s], color=COLORS[name];
    var msg=encodeURIComponent('היי '+name+' 😊 תזכורת למטלות היום: '+byChild[name].join(' ו'));
    var url=phone?'https://wa.me/'+phone.replace(/\D/g,'')+'?text='+msg:'https://wa.me/?text='+msg;
    return '<a href="'+url+'" target="_blank" style="text-decoration:none;"><button class="wa-child-btn" style="border-color:'+color+';color:'+color+';">📱 '+name+'</button></a>';
  }).join('');
}
function toggleWA(){
  var s=document.getElementById('wa-settings');
  if(s.style.display==='block'){ s.style.display='none'; }
  else { s.style.display='block'; buildWAPhoneInputs(); }
}

function goPage(name,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  window.scrollTo(0,0);
  if(name==='shop') renderShop();
  if(name==='friday'){ renderComing(); renderPoll(); renderFriTasks(); }
}

if(db){
  // Shop
  var shopSnap=0;
  db.ref('shop').on('value',function(snap){
    shopSnap++;
    var data=snap.val();
    if(!data||!Array.isArray(data)){
      if(shopSnap===1&&!data) db.ref('shop').set(shopItems);
      return;
    }
    if(JSON.stringify(data)===JSON.stringify(shopItems)) return;
    shopItems=data;
    try{localStorage.setItem('shop_v1',JSON.stringify(shopItems));}catch(e){}
    renderShop();
  });

  // Friday
  var friSnap=0;
  db.ref('friday').on('value',function(snap){
    friSnap++;
    var data=snap.val(); if(!data) return;
    var poll=data.poll;
    if(poll&&typeof poll==='object'&&!Array.isArray(poll)) poll=Object.values(poll);
    if(data.coming) FRI.coming=data.coming;
    if(poll) FRI.poll=poll;
    if(data.taskDone) FRI.taskDone=data.taskDone;
    try{localStorage.setItem('fri_v1',JSON.stringify({coming:FRI.coming,poll:FRI.poll,taskDone:FRI.taskDone}));}catch(e){}
    renderComing(); renderPoll(); renderFriTasks();
  });

  // Tasks (only sync from other devices - skip first snap)
  var taskSnap=0;
  db.ref('tasks').on('value',function(snap){
    taskSnap++;
    if(taskSnap===1) return;
    var data=snap.val(); if(!data) return;
    var changed=false;
    Object.keys(data).forEach(function(key){
      var cur=localStorage.getItem('td_'+key);
      var inc=data[key]?'1':null;
      if(cur!==inc){ if(inc) localStorage.setItem('td_'+key,'1'); else localStorage.removeItem('td_'+key); changed=true; }
    });
    if(changed) initHome();
  });
}
